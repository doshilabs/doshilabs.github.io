---
layout: default
---
<article class="note">
  <header class="note-header">
    <h1>{{ page.title }}</h1>
    <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %-d, %Y" }}</time>
  </header>
  <div class="note-body">
    {{ content }}
  </div>
  <footer class="note-footer">
    <a href="/#notes">← Notes</a>
  </footer>
</article>
