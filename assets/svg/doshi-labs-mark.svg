<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 72" width="256" height="288">
  <!-- Doshi Labs — Königsberg bridge mark, Split B coloring -->
  <!-- D-edges: prussian #1C3461 | L-edges: amber #BA7517 -->

  <!-- outer N-K arc → amber (L vertical stroke) -->
  <path d="M16,6 C4,12 4,26 16,36" fill="none" stroke="#BA7517" stroke-width="2.6" stroke-linecap="round"/>
  <!-- inner N-K arc → prussian (D) -->
  <path d="M16,6 C26,12 26,26 16,36" fill="none" stroke="#1C3461" stroke-width="2.6" stroke-linecap="round"/>
  <!-- K-E crossbar → amber (L foot) -->
  <line x1="16" y1="36" x2="56" y2="36" stroke="#BA7517" stroke-width="2.6" stroke-linecap="round"/>
  <!-- outer S-K arc → prussian (D) -->
  <path d="M16,66 C4,60 4,46 16,36" fill="none" stroke="#1C3461" stroke-width="2.6" stroke-linecap="round"/>
  <!-- inner S-K arc → prussian (D) -->
  <path d="M16,66 C26,60 26,46 16,36" fill="none" stroke="#1C3461" stroke-width="2.6" stroke-linecap="round"/>
  <!-- N-E top arc → prussian (D belly top) -->
  <path d="M16,6 C42,1 58,18 56,36" fill="none" stroke="#1C3461" stroke-width="2.6" stroke-linecap="round"/>
  <!-- S-E bottom arc → prussian (D belly bottom) -->
  <path d="M16,66 C42,71 58,54 56,36" fill="none" stroke="#1C3461" stroke-width="2.6" stroke-linecap="round"/>

  <!-- Nodes: N=amber, K/S/E=prussian, all r=4 -->
  <circle cx="16" cy="6"  r="4" fill="#BA7517"/>
  <circle cx="16" cy="66" r="4" fill="#1C3461"/>
  <circle cx="16" cy="36" r="4" fill="#1C3461"/>
  <circle cx="56" cy="36" r="4" fill="#1C3461"/>
</svg>
